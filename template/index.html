<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Neon Glass Calculator</title>
  <style>
  :root{
    --bg: #000;         /* page background */
    --card: #0b0b0b;    /* calculator card background (very dark) */
    --panel: #111;      /* display background */
    --key: #1a1a1a;     /* key background */
    --key-ghost: #0b0b0b;/* fn keys */
    --accent: #fff;     /* text / icons (white) */
    --muted: #cfcfcf;   /* secondary text (light gray) */
    --shadow: rgba(255,255,255,0.03);
    --radius: 12px;
    --gap: 12px;
    --pad-gap: 10px;
  }

  /* page */
  html,body{
    height:100%;
    margin:0;
    background:var(--bg);
    color:var(--accent);
    font-family: Inter, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px;
  }

  /* main card */
  .card {
    width: min(420px, 96vw);
    background: linear-gradient(180deg, var(--card), #050505);
    border-radius: calc(var(--radius) + 4px);
    padding:18px;
    box-shadow: 0 8px 30px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.04);
    display:grid;
    grid-template-rows: auto auto 1fr;
    gap: 14px;
  }

  /* title row */
  .title{
    display:flex;
    gap:12px;
    align-items:center;
  }
  .logo{
    width:44px;
    height:44px;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:transparent;
    font-size:20px;
    color:var(--accent);
    border:1px solid rgba(255,255,255,0.04);
  }

  .title h1{
    margin:0;
    font-size:18px;
    letter-spacing:0.2px;
    color:var(--accent);
  }
  .subtitle{
    font-size:12px;
    color:var(--muted);
    margin-top:4px;
  }

  /* display */
  .display{
    border-radius: 10px;
    background: linear-gradient(180deg, var(--panel), #0a0a0a);
    padding:12px;
    min-height:88px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:6px;
    border:1px solid rgba(255,255,255,0.03);
  }
  .display .small{
    font-size:13px;
    color:var(--muted);
    min-height:18px;
    word-break:break-all;
  }
  .display .main{
    font-weight:600;
    font-size:28px;
    color:var(--accent);
    text-align:right;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, "Segoe UI Mono", monospace;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  /* keypad */
  .pad{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap: var(--pad-gap);
    align-items:stretch;
  }

  .key{
    background: var(--key);
    border: 1px solid rgba(255,255,255,0.03);
    color: var(--accent);
    font-size:18px;
    padding: 18px 12px;
    border-radius:10px;
    cursor:pointer;
    user-select:none;
    display:flex;
    align-items:center;
    justify-content:center;
    transition: transform 0.08s ease, box-shadow 0.08s ease, background 0.08s;
    box-shadow: 0 3px 8px rgba(0,0,0,0.6);
  }

  /* larger 0 button uses inline grid-column already; ensure consistent style */
  .key[style]{
    justify-content:flex-start;
    padding-left:22px;
  }

  .key:active { transform: translateY(1px) scale(0.998); }
  .key:hover  { box-shadow: 0 6px 18px rgba(0,0,0,0.6); }

  /* function keys (AC, DEL, %) */
  .key.fn{
    background: var(--key-ghost);
    color: var(--accent);
    font-weight:600;
  }

  /* operator keys (+ - × ÷) */
  .key.op{
    background: transparent;
    border: 1px solid rgba(255,255,255,0.06);
    color: var(--accent);
    font-weight:600;
  }

  /* equals key style */
  .key.equal{
    background: var(--accent);
    color: var(--card);
    font-weight:700;
    border: none;
    box-shadow: 0 6px 18px rgba(255,255,255,0.04);
  }
  .key.equal:active{ transform: translateY(1px) scale(0.997); }

  /* accessibility focus */
  .key:focus, .key:focus-visible{
    outline: 3px solid rgba(255,255,255,0.08);
    outline-offset: 2px;
  }

  /* responsive scaling for small screens */
  @media (max-width:380px){
    .card { padding:12px; width: 96vw; }
    .display .main{ font-size:24px; }
    .key{ padding:14px 8px; font-size:16px; border-radius:8px; }
  }

  /* small visual polish: reduce contrast for muted text when showing 'Error' or similar */
  .small.error, .main.error { color: #ffdddd; }
</style>

</head>
<body>
  <main class="card" role="application" aria-label="Calculator">
    <div class="title">
      <div class="logo">♥️</div>
      <div>
        <h1>Calculator</h1>
        <div class="subtitle"></div>
      </div>
    </div>

    <div class="display" id="display" aria-live="polite">
      <div class="small" id="history">&nbsp;</div>
      <div class="main" id="result">0</div>
    </div>

    <div class="pad" role="group" aria-label="Calculator keypad">
      <button class="key fn" data-action="clear" aria-label="All clear">AC</button>
      <button class="key fn" data-action="del" aria-label="Delete">DEL</button>
      <button class="key fn" data-value="%" aria-label="percent">%</button>
      <button class="key op" data-value="/" aria-label="divide">÷</button>

      <button class="key" data-value="7">7</button>
      <button class="key" data-value="8">8</button>
      <button class="key" data-value="9">9</button>
      <button class="key op" data-value="*" aria-label="multiply">×</button>

      <button class="key" data-value="4">4</button>
      <button class="key" data-value="5">5</button>
      <button class="key" data-value="6">6</button>
      <button class="key op" data-value="-" aria-label="minus">−</button>

      <button class="key" data-value="1">1</button>
      <button class="key" data-value="2">2</button>
      <button class="key" data-value="3">3</button>
      <button class="key op" data-value="+" aria-label="plus">+</button>

      <button class="key" data-value="0" style="grid-column: span 2; text-align:left; padding-left:22px">0</button>
      <button class="key" data-value="." aria-label="decimal">.</button>
      <button class="key equal" data-action="equals" aria-label="equals">=</button>
    </div>

  </main>

  <script>
    (function(){
      const display = document.getElementById('result');
      const history = document.getElementById('history');
      let expr = '';
      let lastResult = null;

      function sanitizeInput(input){
        // allow digits, operators, parentheses, decimal and percent and spaces
        return input.replace(/[^0-9+\-*/().% ]+/g, '');
      }

      function render(){
        display.textContent = expr === '' ? '0' : expr;
        history.textContent = lastResult === null ? '\u00A0' : ('Ans = ' + lastResult);
      }

      function append(val){
        expr += val;
        expr = sanitizeInput(expr);
        render();
      }

      function clearAll(){ expr=''; lastResult=null; render(); }
      function del(){ expr = expr.slice(0,-1); render(); }

      function compute(){
        if (!expr) return;
        try{
          // convert percent: e.g. 50% -> (50/100)
          const transformed = expr.replace(/(\d+(?:\.\d+)?)%/g, '($1/100)');
          // use Function to evaluate safely in local scope
          const value = Function('return (' + transformed + ')')();
          if (Number.isFinite(value)){
            lastResult = +parseFloat(value.toFixed(12));
            expr = String(lastResult);
          } else {
            expr = '';
            lastResult = 'Error';
          }
        }catch(e){
          expr = '';
          lastResult = 'Error';
        }
        render();
      }

      // click handling
      document.querySelectorAll('button.key').forEach(b=>{
        b.addEventListener('click', ()=>{
          const action = b.dataset.action;
          const val = b.dataset.value;
          if (action === 'clear') return clearAll();
          if (action === 'del') return del();
          if (action === 'equals') return compute();
          if (val) return append(val);
        });
      });

      // keyboard support
      window.addEventListener('keydown', (ev)=>{
        if (ev.key >= '0' && ev.key <= '9') { append(ev.key); ev.preventDefault(); }
        else if (['+','-','*','/','(',')','.','%'].includes(ev.key)){ append(ev.key); ev.preventDefault(); }
        else if (ev.key === 'Enter' || ev.key === '='){ compute(); ev.preventDefault(); }
        else if (ev.key === 'Backspace'){ del(); ev.preventDefault(); }
        else if (ev.key.toLowerCase() === 'c' && (ev.ctrlKey || ev.metaKey)){ clearAll(); ev.preventDefault(); }
      });

      // initial render
      render();
    })();
  </script>
</body>
</html>
